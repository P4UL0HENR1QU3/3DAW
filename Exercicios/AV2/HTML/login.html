<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Albergue Santa Teresa</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header class="topo-site topo-login">
        <div class="container-topo">
            <span class="site-url" style="font-size: 1rem; opacity: 1;">Alberguesantateresa.com</span>
        </div>
    </header>

    <div class="container-voltar">
        <a href="albergue.html" class="btn-voltar-figma" title="Voltar">
            <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 14L4 9l5-5"/>
                <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/>
            </svg>
        </a>
    </div>

    <main class="area-card-login">
        <div class="card-cinza-login">
            
            <h1 class="titulo-card-login" id="titulo-form">Faça o login</h1>
            <div class="linha-separadora-titulo"></div>

            <form id="form-acesso" onsubmit="processarAcesso(event)">
                <input type="hidden" id="acao" name="acao" value="login">
                
                <div class="grupo-input-login">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="grupo-input-login">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <button type="submit" class="btn-acao-login" id="btn-submit">Entrar</button>
            </form>

            <div class="divisor-ou">
                <span>ou</span>
            </div>

            <div class="botoes-sociais-box">
                <button type="button" class="btn-acao-login" style="background-color: #d3c39d;" onclick="alternarFormulario()" id="btn-alternar">Não tem conta? Cadastre-se</button>
            </div>

        </div>
    </main>

    <script>
        let modoLogin = true;

        // Função que muda a tela de Login para Cadastro sem recarregar a página
        function alternarFormulario() {
            modoLogin = !modoLogin;
            const titulo = document.getElementById('titulo-form');
            const btnSubmit = document.getElementById('btn-submit');
            const btnAlternar = document.getElementById('btn-alternar');
            const acao = document.getElementById('acao');

            if(modoLogin) {
                titulo.innerText = "Faça o login";
                btnSubmit.innerText = "Entrar";
                btnAlternar.innerText = "Não tem conta? Cadastre-se";
                acao.value = "login";
            } else {
                titulo.innerText = "Crie sua conta";
                btnSubmit.innerText = "Cadastrar";
                btnAlternar.innerText = "Já tem conta? Faça login";
                acao.value = "cadastrar";
            }
        }

        // Função que envia os dados para o PHP
        function processarAcesso(event) {
            event.preventDefault();
            
            const dados = new FormData(document.getElementById('form-acesso'));

            fetch('../PHP/login.php', {
                method: 'POST',
                body: dados
            })
            .then(res => res.json())
            .then(resposta => {
                alert(resposta.mensagem); // Mostra o alerta na tela
                
                if (resposta.status === 'sucesso') {
                    if (document.getElementById('acao').value === 'login') {
                        // Se fez login com sucesso, vai para a página inicial
                        window.location.href = 'albergue.html';
                    } else {
                        // Se fez cadastro com sucesso, volta para a tela de login
                        alternarFormulario();
                        document.getElementById('senha').value = '';
                    }
                }
            })
            .catch(erro => console.error("Erro na requisição:", erro));
        }
    </script>
</body>
</html>
