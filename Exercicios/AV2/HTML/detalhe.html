<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="titulo-pagina">Carregando... - Albergue</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header class="topo-site topo-login">
        <div class="container-topo">
            <span class="site-url" style="font-size: 1rem;">Alberguesantateresa.com</span>
        </div>
    </header>

    <div class="container-voltar">
        <a href="albergue.html" class="btn-voltar-figma" title="Voltar para a Home">
    <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
</a>
    </div>

    <main class="conteudo-principal">
        <div class="grid-detalhe-figma">
            
            <div class="coluna-esq-detalhe">
                <h1 class="titulo-detalhe" id="titulo-oferta">Buscando detalhes do quarto...</h1>
                
                <div class="foto-destaque-box">
                    <img id="imagem-quarto" src="" alt="Foto do Quarto">
                </div>

                <div class="tags-flex-box">
                    <span class="tag-figma" id="tag-camas">- Camas</span>
                    <span class="tag-figma">Tem Banheiro</span>
                    <span class="tag-figma">Tem Janela</span>
                    <span class="tag-figma">Wi-Fi Grátis</span>
                </div>

                <div class="area-comentario-figma">
                    <div class="topo-comentario">
                        <span>Adicione um comentário</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <textarea placeholder="Escreva uma pergunta para a recepção..."></textarea>
                </div>
            </div>

            <div class="coluna-dir-detalhe">
                <div class="box-reserva-figma">
                    <div class="topo-box-reserva">Reserve já!</div>
                    <div class="miolo-box-reserva">
    <p id="texto-capacidade" style="margin-bottom:15px; font-size:0.9rem; font-weight:600; color:#4d5635;">Buscando vagas...</p>
    
    <div id="area-selecao" style="display: none; text-align: left; margin-bottom: 20px;">
        <label style="font-size: 0.8rem; font-weight: 600;">Quantas camas deseja reservar?</label>
        <select id="qtd-selecionada" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 2px;"></select>
    </div>

    <button class="btn-checar" id="btn-reservar" disabled>Checar Disponibilidade</button>
</div>
                </div>
            </div>

        </div>
    </main>

    <footer class="rodape-site">
        <div class="rodape-links"><p>XXX/2026 Alberguesantateresa.com</p></div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        
        // 1. O JavaScript "lê" a barra de endereços para descobrir o ID (ex: ?id=3)
        const parametrosURL = new URLSearchParams(window.location.search);
        const idQuarto = parametrosURL.get('id') || 1; 

        // 2. O JS pede os dados ao ficheiro PHP dentro da pasta correspondente
        fetch(`../PHP/detalhe.php?id=${idQuarto}`)
        .then(res => res.json())
        .then(resposta => {
            
            if(resposta.status === 'sucesso') {
                const quarto = resposta.dados;

                // 3. Preenche a página HTML com os dados vindos do banco de dados
                document.getElementById('titulo-pagina').innerText = `${quarto.titulo} - Albergue`;
                
                // Formata o preço com vírgula
                const precoBR = parseFloat(quarto.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('titulo-oferta').innerText = `OFERTA ${quarto.categoria.toUpperCase()}! - R$ ${precoBR}`;
                
                document.getElementById('imagem-quarto').src = quarto.imagem;
                document.getElementById('imagem-quarto').alt = quarto.titulo;
                
                document.getElementById('tag-camas').innerText = `${quarto.capacidade} Camas`;

                const vagasLivres = parseInt(quarto.vagas_livres);

                // Se não sobrarem vagas, bloqueia a reserva
                if (vagasLivres <= 0) {
                    document.getElementById('texto-capacidade').innerText = `❌ Esgotado! 0 de ${quarto.capacidade} vagas disponíveis.`;
                    document.getElementById('texto-capacidade').style.color = 'red';
                    document.getElementById('btn-reservar').innerText = 'Quarto Lotado';
                    document.getElementById('btn-reservar').disabled = true;
                } else {
                    // Mostra quantas vagas reais restam
                    document.getElementById('texto-capacidade').innerText = `✅ ${vagasLivres} de ${quarto.capacidade} vagas disponíveis!`;
                    document.getElementById('texto-capacidade').style.color = '#4d5635';
                    
                    // Limpa e preenche o seletor com as opções de camas até o limite disponível
                    const selectBox = document.getElementById('qtd-selecionada');
                    selectBox.innerHTML = "";
                    for(let i = 1; i <= vagasLivres; i++) {
                        selectBox.innerHTML += `<option value="${i}">${i} cama(s)</option>`;
                    }
                    
                    // Exibe o painel de seleção e ativa o botão de prosseguir
                    document.getElementById('area-selecao').style.display = 'block';
                    document.getElementById('btn-reservar').disabled = false;

                    // Configura o botão para ir para a página de pagamento levando o ID e a QTD pela URL
                    document.getElementById('btn-reservar').onclick = () => {
                        const qtdEscolhida = document.getElementById('qtd-selecionada').value;
                        window.location.href = `pagamento.html?id=${quarto.id}&qtd=${qtdEscolhida}`;
                    };
                }

            } else {
                // Se o quarto não existir no banco de dados, redireciona de volta para a home
                window.location.href = 'albergue.html';
            }
        })
        .catch(erro => console.error("Erro ao buscar detalhes:", erro));
    });
</script>
</body>
</html>
